<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container text-center signcard">
        <h2>Sign Up</h2>
        <form id="signupForm" class="mx-auto" style="max-width: 300px;">
            <input type="text" id="regUser" class="form-control mb-2" placeholder="Username" required>
            <input type="password" id="regPass" class="form-control mb-2" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100">Sign Up</button>
        </form>
        <p class="mt-3">Already have an account? <a href="login.html">Login</a></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
</body>
</html>
