<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">MyPostApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav  mb-2 mb-lg-0 fw-bold text-center ms-auto pl-2 ">
                    <li class="nav-item" id="logoutBtn">
                        <button class="btn btn-danger ms-2" onclick="logout()">Logout</button>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <div class="container content mt-5" id="postContainer">
        <h1 class="m-auto text-center mb-4">Welcome, <span id="userName"></span> to Post App</h1>
        <div class="row">
            <div class="col-sm-12 col-md-6 col-lg-4 ">
                <div class="card p-4 mb-4 mt-4 one">
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label textcol">Title</label>
                        <input type="text" class="form-control" id="title" aria-describedby="emailHelp"
                            placeholder="add title name " />
                    </div>
                    <div class="mb-3">
                        <label for="exampleFormControlTextarea1" class="form-label textcol">Description</label>
                        <textarea class="form-control" id="description" rows="3"
                            placeholder="add a post description"></textarea>
                    </div>
                   
                    <button onclick="post()" type="submit" class="btn btn-primary ms-auto">
                        Post
                    </button>
                </div>
            </div>
            <div class="col-sm-12 col-md-6 col-lg-8">
                <div id="posts" class="posts m-2"></div>
            </div>

        </div>
    </div>
    <script>
        // Security Check
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';

        // Display current user name
        let currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            document.getElementById('userName').textContent = currentUser;
        }

        // Load posts on page load
        rederPost();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
